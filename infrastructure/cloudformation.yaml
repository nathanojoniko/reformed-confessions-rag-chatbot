AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Reformed Confessions RAG Chatbot — Full AWS Infrastructure
  Creates S3 buckets, S3 Vectors, IAM roles, Lambda, API Gateway, and Cognito.
  No hardcoded credentials. All access via IAM roles.

# ============================================================
# PARAMETERS — values you supply when deploying this template
# ============================================================
Parameters:

  ProjectName:
    Type: String
    Default: reformed-confessions-rag
    Description: Prefix used for all resource names

# ============================================================
# RESOURCES
# ============================================================
Resources:

  # ----------------------------------------------------------
  # S3 BUCKET — stores your source confession JSON files
  # ----------------------------------------------------------
  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-documents-${AWS::AccountId}"
      # Block ALL public access — these are private documents
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # Encrypt documents at rest
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # S3 BUCKET — stores vector embeddings (cheap alternative to OpenSearch)
  # ----------------------------------------------------------
  VectorsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-vectors-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # IAM ROLE — for Bedrock Knowledge Base
  # Grants Bedrock permission to read from S3 and write vectors
  # No hardcoded credentials needed
  # ----------------------------------------------------------
  BedrockKnowledgeBaseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-bedrock-kb-role"
      # Who can assume this role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      # What this role is allowed to do
      Policies:
        - PolicyName: BedrockKnowledgeBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read confession documents from S3
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DocumentsBucket.Arn
                  - !Sub "${DocumentsBucket.Arn}/*"
              # Read and write vectors to S3 Vectors bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt VectorsBucket.Arn
                  - !Sub "${VectorsBucket.Arn}/*"
              # Use Titan Embeddings model
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"

  # ----------------------------------------------------------
  # IAM ROLE — for Lambda function
  # Grants Lambda permission to call Bedrock and write logs
  # ----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Basic Lambda logging to CloudWatch
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaBedrockPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Call Bedrock retrieve_and_generate API
              - Effect: Allow
                Action:
                  - bedrock:RetrieveAndGenerate
                  - bedrock:Retrieve
                  - bedrock:InvokeModel
                Resource: "*"
              # Read from S3 documents bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "${DocumentsBucket.Arn}/*"

  # ----------------------------------------------------------
  # LAMBDA FUNCTION — the chatbot backend
  # Receives a question, calls Bedrock, returns cited answer
  # ----------------------------------------------------------
  ChatbotLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-chatbot"
      Runtime: python3.12
      Handler: lambda_handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      # Environment variables — NO secrets here, just config
      Environment:
        Variables:
          PROJECT_NAME: !Ref ProjectName
          # Knowledge Base ID added here after KB is created
          KNOWLEDGE_BASE_ID: "REPLACE_AFTER_KB_CREATED"
          MODEL_ARN: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-haiku-20240307-v1:0"
      # Placeholder code — replaced when you deploy src/lambda_handler.py
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({'message': 'Lambda deployed successfully. Update with real code.'})
              }
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ----------------------------------------------------------
  # API GATEWAY — HTTPS endpoint that triggers Lambda
  # ----------------------------------------------------------
  ChatbotApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api"
      Description: Reformed Confessions RAG Chatbot API
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ChatbotApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ChatbotApi
      ParentId: !GetAtt ChatbotApi.RootResourceId
      PathPart: chat

  ChatbotApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ChatbotApi
      ResourceId: !Ref ChatbotApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub
          - "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaArn}/invocations"
          - LambdaArn: !GetAtt ChatbotLambda.Arn

  # Permission for API Gateway to invoke Lambda
  ApiGatewayLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ChatbotLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatbotApi}/*"

  ChatbotApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ChatbotApiMethod
    Properties:
      RestApiId: !Ref ChatbotApi
      StageName: prod

  # ----------------------------------------------------------
  # COGNITO USER POOL — authentication for invited users only
  # ----------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-users"
      # Require email for sign-in
      UsernameAttributes:
        - email
      # Admin creates accounts — no self sign-up
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      # Password policy
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-client"
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  # ----------------------------------------------------------
  # AWS BUDGET ALARM — emails you if spend exceeds $5
  # ----------------------------------------------------------
  BudgetAlarm:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "${ProjectName}-budget"
        BudgetLimit:
          Amount: 5
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
          Subscribers:
            - SubscriptionType: EMAIL
              Address: '{{resolve:ssm:/reformed-confessions/alert-email}}'
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
          Subscribers:
            - SubscriptionType: EMAIL
              Address: '{{resolve:ssm:/reformed-confessions/alert-email}}'

# ============================================================
# OUTPUTS — values printed after deployment
# ============================================================
Outputs:

  DocumentsBucketName:
    Description: S3 bucket name for confession documents — upload your JSON files here
    Value: !Ref DocumentsBucket
    Export:
      Name: !Sub "${ProjectName}-documents-bucket"

  VectorsBucketName:
    Description: S3 bucket name for vector embeddings
    Value: !Ref VectorsBucket
    Export:
      Name: !Sub "${ProjectName}-vectors-bucket"

  BedrockKnowledgeBaseRoleArn:
    Description: IAM Role ARN for Bedrock Knowledge Base — use this when creating the KB
    Value: !GetAtt BedrockKnowledgeBaseRole.Arn
    Export:
      Name: !Sub "${ProjectName}-kb-role-arn"

  ApiEndpoint:
    Description: HTTPS endpoint for the chatbot API
    Value: !Sub "https://${ChatbotApi}.execute-api.${AWS::Region}.amazonaws.com/prod/chat"
    Export:
      Name: !Sub "${ProjectName}-api-endpoint"

  UserPoolId:
    Description: Cognito User Pool ID — use this to create user accounts
    Value: !Ref UserPool
    Export:
      Name: !Sub "${ProjectName}-user-pool-id"

  UserPoolClientId:
    Description: Cognito App Client ID — used in Streamlit auth
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "${ProjectName}-user-pool-client-id"